description: Faster Whisper v3
environment_variables:
  # Override to load a custom HF model instead of the cached large-v3.
  # Set to a HF repo ID, e.g. "baseten-admin/elise-ai-finetuned-whisper".
  # Leave empty to fall back to the bundled Systran/faster-whisper-large-v3.
  WHISPER_MODEL_REPO: 'baseten-admin/elise-ai-finetuned-whisper'
  # VAD tuning knobs for segmentation A/B tests.
  # Keep defaults empty/standard to match current behavior; override per deploy.
  FW_VAD_THRESHOLD: ''
  FW_VAD_NEG_THRESHOLD: ''
  FW_VAD_MIN_SPEECH_MS: ''
  FW_VAD_MAX_SPEECH_S: ''
  FW_VAD_MIN_SILENCE_MS: ''
  FW_VAD_SPEECH_PAD_MS: ''
  HF_HOME: /cache/org
  HF_HUB_CACHE: /cache/org
  LD_LIBRARY_PATH: '/usr/local/lib/python3.9/site-packages/nvidia/cudnn/lib:/usr/local/lib/python3.9/site-packages/nvidia/cublas/lib:/usr/local/lib/python3.9/dist-packages/nvidia/cudnn/lib:/usr/local/lib/python3.9/dist-packages/nvidia/cublas/lib'
external_package_dirs: []
model_cache:
- repo_id: Systran/faster-whisper-large-v3
  use_volume: true
  revision: edaa852
  volume_folder: faster-whisper-large-v3
model_metadata:
  avatar_url: https://cdn.baseten.co/production/static/openai.png
  cover_image_url: https://cdn.baseten.co/production/static/whisper.png
  example_model_input:
    url: https://cdn.baseten.co/docs/production/Gettysburg.mp3
  model_id: large-v3
  pretty_name: Whisper
  tags:
  - speech-recognition
model_name: Faster Whisper v3 (EliseAI)
python_version: py39
requirements:
- torch==2.5.1
- faster-whisper==1.2.1
- ctranslate2==4.6.0
- nvidia-cudnn-cu12==9.1.0.70
- numpy==1.26.4
- huggingface_hub>=0.22.0
resources:
  accelerator: A10G
  cpu: 500m
  memory: 512Mi
  use_gpu: true
secrets:
  hf_access_token: null
system_packages: []
