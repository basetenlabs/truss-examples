model_name: Qwen3 TTS 12Hz Base Streaming (1.7B)
python_version: py312
model_metadata:
  example_model_input:
    task_type: Base
    voice_name: my_voice
    ref_text: "Transcript of the reference audio."
    ref_audio: "data:audio/wav;base64,<base64-encoded-reference-audio>"
secrets:
  hf_access_token: null
system_packages:
  - sox
  - ffmpeg
docker_server:
  start_command: sh -c 'chmod +x /app/data/do.sh && /app/data/do.sh'
  readiness_endpoint: /health
  liveness_endpoint: /health
  predict_endpoint: /v1/audio/speech/stream
  server_port: 8091
requirements:
  - https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.7.16/flash_attn-2.6.3+cu128torch2.10-cp312-cp312-linux_x86_64.whl
  - https://wheels.vllm.ai/2d5be1dd5ce2e44dfea53ea03ff61143da5137eb/vllm-0.16.0-cp38-abi3-manylinux_2_31_x86_64.whl
resources:
  accelerator: H100
  use_gpu: true
runtime:
  predict_concurrency: 128
  is_websocket_endpoint: true
  transport:
    kind: websocket
    ping_interval_seconds: null
    ping_timeout_seconds: null
