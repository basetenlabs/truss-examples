model_name: "model:qwen3.5-122b preset:latency"
model_metadata:
  example_model_input:
    model: "Qwen/Qwen3.5-122B-A10B"
    messages:
      - role: user
        content: "What is the capital of France?"
    max_tokens: 100
    temperature: 0.7
base_image:
  image: vllm/vllm-openai:v0.18.0
weights:
  - source: "hf://Qwen/Qwen3.5-122B-A10B@main"
    mount_location: "/app/checkpoint/qwen3.5-122b-a10b"
    auth_secret_name: "hf_access_token"
build_commands: []
docker_server:
  start_command: >-
    sh -c "vllm serve /app/checkpoint/qwen3.5-122b-a10b
    --served-model-name Qwen/Qwen3.5-122B-A10B
    --host 0.0.0.0
    --port 8000
    --gpu-memory-utilization 0.95
    --max-model-len 32768
    --dtype bfloat16
    --tensor-parallel-size 4
    --reasoning-parser qwen3
    --enable-auto-tool-choice
    --tool-call-parser qwen3_coder
    --trust-remote-code"
  readiness_endpoint: /health
  liveness_endpoint: /health
  predict_endpoint: /v1/chat/completions
  server_port: 8000
environment_variables:
  HF_HUB_ENABLE_HF_TRANSFER: '1'
  VLLM_LOGGING_LEVEL: WARNING
runtime:
  predict_concurrency: 128
resources:
  accelerator: H100:4
  use_gpu: true
secrets:
  hf_access_token: null
