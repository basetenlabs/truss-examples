base_image:
  image: public.ecr.aws/q9t5s3a7/vllm-ci-test-repo:e00c094f15e79c5a113fdf975df1ee9018cb65b3
model_metadata:
  repo_id: nm-testing/NVLM-D-72B-FP8-dynamic
  example_model_input: {
    "model": "nvlm",
    "messages": [
      {
      "role": "user",
      "content": [
        {
        "type": "text",
        "text": "Describe this image in one sentence."
        },
        {
        "type": "image_url",
        "image_url": {
          "url": "https://picsum.photos/id/237/200/300"
        }
        }
      ]
      }
    ],
    "stream": false,
    "max_tokens": 512,
    "temperature": 0.5
  }
docker_server:
  start_command: sh -c "HF_TOKEN=$(cat /secrets/hf_access_token) vllm serve nm-testing/NVLM-D-72B-FP8-dynamic --tensor-parallel-size 4 --enforce-eager --max-model-len 32768 --max-num-seqs 16 --served-model-name nvlm"
  readiness_endpoint: /health
  liveness_endpoint: /health
  predict_endpoint: /v1/chat/completions
  server_port: 8000
resources:
  accelerator: H100:4
  use_gpu: true
model_name: NVLM-D Trussless
environment_variables:
  VLLM_LOGGING_LEVEL: INFO
  hf_access_token: null
