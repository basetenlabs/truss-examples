model_name: GLM-OCR
model_metadata:
  example_model_input:
    model: "zai-org/GLM-OCR"
    messages:
      - role: user
        content:
          - type: image_url
            image_url:
              url: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
          - type: text
            text: "Text Recognition:"
    max_tokens: 4096
  tags:
    - openai-compatible
base_image:
  image: vllm/vllm-openai:nightly-36735fd77224467e6580f3bd48eb32d4fca8c72e
build_commands:
  - apt-get update && apt-get install -y git
  - pip install git+https://github.com/huggingface/transformers.git@83eb94c1febf98b25338622b14522b7288f1f3fd
docker_server:
  start_command: sh -c "HF_TOKEN=$(cat /secrets/hf_access_token) vllm serve zai-org/GLM-OCR --served-model-name zai-org/GLM-OCR --host 0.0.0.0 --port 8000 --max-model-len 8192 --trust-remote-code --enable-prefix-caching"
  readiness_endpoint: /health
  liveness_endpoint: /health
  predict_endpoint: /v1/chat/completions
  server_port: 8000
resources:
  accelerator: L4
  use_gpu: true
runtime:
  predict_concurrency: 32
secrets:
  hf_access_token: null